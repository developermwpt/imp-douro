<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMP Douro — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C4A860;
      --dark: #1A1A1A;
      --bg: #F7FAFC;
      --white: #fff;
      --border: #E2E8F0;
      --text: #2D3748;
      --muted: #718096;
      --danger: #E53E3E;
      --success: #38A169;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── AUTH ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-card {
      background: var(--white); border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 2.5rem;
      width: 100%; max-width: 400px;
    }
    .login-card .logo { text-align: center; margin-bottom: 2rem; }
    .login-card .logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
    .login-card .logo span { color: var(--gold); }
    .login-card .logo p { color: var(--muted); font-size: .875rem; margin-top: .25rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .5rem; }
    .form-group input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 1rem; transition: border-color .2s; outline: none;
    }
    .form-group input:focus { border-color: var(--gold); }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .75rem 1.5rem; border-radius: 8px; font-size: .9rem;
      font-weight: 600; cursor: pointer; border: none; transition: all .2s;
    }
    .btn-primary { background: var(--gold); color: var(--white); }
    .btn-primary:hover { background: #A08040; }
    .btn-danger { background: var(--danger); color: var(--white); }
    .btn-danger:hover { background: #C53030; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #CBD5E0; }
    .btn-block { width: 100%; justify-content: center; }
    .btn-sm { padding: .4rem .85rem; font-size: .8rem; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg { color: var(--danger); font-size: .85rem; margin-top: .75rem; text-align: center; }

    /* ── APP ── */
    #app-screen { display: none; }

    header {
      background: var(--dark); color: var(--white);
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: var(--gold); }
    header .user-info { display: flex; align-items: center; gap: 1rem; font-size: .875rem; }
    header .user-info span { color: #A0AEC0; }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

    .card {
      background: var(--white); border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07); padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .card-header h2 { font-size: 1.1rem; font-weight: 700; }
    .card-header p { font-size: .8rem; color: var(--muted); margin-top: .2rem; }

    /* ── ADD FORM ── */
    .add-form { display: flex; gap: .75rem; align-items: flex-end; }
    .add-form .field { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .add-form .field label { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; }
    .add-form input[type="text"] {
      width: 100%; padding: .6rem 1rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .9rem; line-height: 1.4; outline: none;
      box-sizing: border-box;
    }
    .add-form input[type="text"]:focus { border-color: var(--gold); }

    /* ── IMAGE UPLOAD ── */
    .img-upload-wrap { position: relative; }
    .img-upload-label {
      display: flex; align-items: center; gap: .6rem;
      padding: .6rem 1rem; border: 1.5px dashed var(--border);
      border-radius: 8px; cursor: pointer; font-size: .9rem; line-height: 1.4;
      color: var(--muted); transition: border-color .2s, color .2s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      box-sizing: border-box;
    }
    .img-upload-label:hover { border-color: var(--gold); color: var(--text); }
    .img-upload-label svg { flex-shrink: 0; }
    .img-upload-label input[type="file"] { display: none; }

    /* ── AREAS LIST ── */
    .areas-list { list-style: none; }
    .area-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem .5rem; border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .area-item:last-child { border-bottom: none; }
    .area-item:hover { background: #FAFAFA; border-radius: 8px; }

    /* Thumbnail */
    .area-thumb {
      width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0;
      overflow: hidden; background: linear-gradient(135deg, #1A1A1A 0%, #2d2410 50%, #C4A860 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .area-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .area-thumb svg { width: 22px; height: 22px; opacity: .7; }

    .area-name { flex: 1; font-size: .95rem; font-weight: 500; min-width: 0; }
    .area-name input {
      width: 100%; padding: .35rem .6rem; border: 1.5px solid var(--gold);
      border-radius: 6px; font-size: .95rem; outline: none;
    }

    .area-actions { display: flex; gap: .5rem; flex-shrink: 0; }

    .badge-active {
      font-size: .7rem; font-weight: 600; padding: .2rem .55rem;
      border-radius: 99px; background: #C6F6D5; color: #276749; flex-shrink: 0;
    }

    /* ── EDIT IMAGE ROW ── */
    .edit-image-row {
      display: flex; align-items: center; gap: .6rem;
      margin-top: .6rem; padding: .6rem .5rem;
      background: #F7FAFC; border-radius: 8px;
    }
    .edit-image-row label { font-size: .8rem; color: var(--muted); cursor: pointer; }
    .edit-image-row input[type="file"] { display: none; }
    .edit-thumb {
      width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
      overflow: hidden; background: linear-gradient(135deg, #1A1A1A, #C4A860);
    }
    .edit-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .remove-img-btn { font-size: .75rem; color: var(--danger); background: none; border: none; cursor: pointer; padding: 0; }

    .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: .9rem; }
    .empty   { text-align: center; padding: 2rem; color: var(--muted); font-size: .9rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--dark); color: var(--white);
      padding: .8rem 1.4rem; border-radius: 8px;
      font-size: .875rem; font-weight: 500;
      transform: translateY(100px); opacity: 0;
      transition: all .3s ease; z-index: 999; max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 4px solid var(--success); }
    #toast.error   { border-left: 4px solid var(--danger); }

    @media (max-width: 600px) {
      .add-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">
      <h1>IMP <span>Douro</span></h1>
      <p>Content Management System</p>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@impdouro.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-block" id="login-btn" onclick="login()">Sign In</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <h1>IMP <span>Douro</span> — Admin</h1>
    <div class="user-info">
      <span id="user-email"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Add area -->
    <div class="card">
      <div class="card-header">
        <div>
          <h2>Add New Area</h2>
          <p>Add a new location to the "Areas We Serve in Dubai" section</p>
        </div>
      </div>
      <div class="add-form">
        <div class="field">
          <label>Area name</label>
          <input type="text" id="new-area-name" placeholder="e.g. Al Barsha" onkeydown="if(event.key==='Enter') addArea()">
        </div>
        <div class="field">
          <label>Image (optional)</label>
          <div class="img-upload-wrap">
            <label class="img-upload-label" id="new-img-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/><path d="M3 15l4-4 3 3 3-3.5 5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              <span id="new-img-label-text">Choose image…</span>
              <input type="file" id="new-area-image" accept="image/jpeg,image/png,image/webp" onchange="previewNewImage(this)">
            </label>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addArea()" id="add-btn" style="height:42px">+ Add</button>
      </div>
      <div id="new-img-preview" style="margin-top:.75rem;display:none">
        <img id="new-img-preview-img" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--gold)">
        <button onclick="clearNewImage()" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:.8rem;margin-left:.5rem">✕ Remove</button>
      </div>
    </div>

    <!-- Areas list -->
    <div class="card">
      <div class="card-header">
        <div>
          <h2>Areas We Serve in Dubai</h2>
          <p id="areas-count">Loading...</p>
        </div>
      </div>
      <ul class="areas-list" id="areas-list">
        <li class="loading">Loading areas...</li>
      </ul>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL      = 'https://supabase.mobiweb.pt'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJyb2xlIjogImFub24iLCAiaXNzIjogInN1cGFiYXNlIiwgImlhdCI6IDE3NzY2OTA0OTYsICJleHAiOiAyMDkyMDUwNDk2fQ.umUlKtaceMo_mcUY9msIPqDRKQUPGypH-JJ3BHtAt94'
  const BUCKET            = 'areas-images'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let editingId = null

  const placeholder = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="rgba(196,168,96,0.8)"/></svg>`

  // ── AUTH ──────────────────────────────────────────
  async function login() {
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const btn = document.getElementById('login-btn')
    const err = document.getElementById('login-error')
    err.textContent = ''
    btn.disabled = true; btn.textContent = 'Signing in...'
    const { data, error } = await sb.auth.signInWithPassword({ email, password })
    if (error) {
      err.textContent = 'Invalid email or password.'
      btn.disabled = false; btn.textContent = 'Sign In'
      return
    }
    showApp(data.user)
  }

  async function logout() {
    await sb.auth.signOut()
    document.getElementById('app-screen').style.display = 'none'
    document.getElementById('login-screen').style.display = 'flex'
  }

  function showApp(user) {
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('app-screen').style.display = 'block'
    document.getElementById('user-email').textContent = user.email
    loadAreas()
  }

  // ── IMAGE HELPERS ─────────────────────────────────
  function previewNewImage(input) {
    const file = input.files[0]
    if (!file) return
    document.getElementById('new-img-label-text').textContent = file.name
    const preview = document.getElementById('new-img-preview')
    const img = document.getElementById('new-img-preview-img')
    img.src = URL.createObjectURL(file)
    preview.style.display = 'block'
  }

  function clearNewImage() {
    document.getElementById('new-area-image').value = ''
    document.getElementById('new-img-label-text').textContent = 'Choose image…'
    document.getElementById('new-img-preview').style.display = 'none'
  }

  async function compressImage(file, maxSize = 800, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const img = new Image()
      const url = URL.createObjectURL(file)
      img.onload = () => {
        URL.revokeObjectURL(url)
        let { width, height } = img
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round(height * maxSize / width); width = maxSize }
          else { width = Math.round(width * maxSize / height); height = maxSize }
        }
        const canvas = document.createElement('canvas')
        canvas.width = width; canvas.height = height
        canvas.getContext('2d').drawImage(img, 0, 0, width, height)
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Compression failed')), 'image/jpeg', quality)
      }
      img.onerror = reject
      img.src = url
    })
  }

  async function uploadImage(file, areaId) {
    const compressed = await compressImage(file)
    const path = `${areaId}-${Date.now()}.jpg`
    const { error } = await sb.storage.from(BUCKET).upload(path, compressed, { upsert: true, contentType: 'image/jpeg' })
    if (error) throw error
    const { data } = sb.storage.from(BUCKET).getPublicUrl(path)
    return data.publicUrl
  }

  async function removeImage(imageUrl) {
    if (!imageUrl) return
    const path = imageUrl.split(`/${BUCKET}/`)[1]
    if (path) await sb.storage.from(BUCKET).remove([path])
  }

  // ── AREAS ─────────────────────────────────────────
  async function loadAreas() {
    const list = document.getElementById('areas-list')
    list.innerHTML = '<li class="loading">Loading areas...</li>'
    const { data, error } = await sb.from('areas').select('*').order('sort_order')
    if (error) { list.innerHTML = '<li class="empty">Error loading areas.</li>'; return }
    document.getElementById('areas-count').textContent = `${data.length} area${data.length !== 1 ? 's' : ''} configured`
    renderAreas(data)
  }

  function thumbHtml(imageUrl) {
    if (imageUrl) return `<img src="${imageUrl}" alt="">`
    return placeholder
  }

  function renderAreas(areas) {
    const list = document.getElementById('areas-list')
    if (!areas.length) { list.innerHTML = '<li class="empty">No areas yet. Add one above.</li>'; return }

    list.innerHTML = areas.map(area => `
      <li class="area-item" id="item-${area.id}">
        <div class="area-thumb" id="thumb-${area.id}">${thumbHtml(area.image_url)}</div>
        <div class="area-name" id="name-${area.id}">${escHtml(area.name)}</div>
        <span class="badge-active">active</span>
        <div class="area-actions" id="actions-${area.id}">
          <button class="btn btn-secondary btn-sm" onclick="startEdit(${area.id}, '${escAttr(area.name)}', '${escAttr(area.image_url || '')}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteArea(${area.id}, '${escAttr(area.name)}', '${escAttr(area.image_url || '')}')">Delete</button>
        </div>
      </li>
    `).join('')
  }

  function startEdit(id, currentName, currentImageUrl) {
    if (editingId && editingId !== id) cancelEdit(editingId)
    editingId = id

    document.getElementById(`name-${id}`).innerHTML =
      `<input type="text" value="${escAttr(currentName)}" id="edit-input-${id}" onkeydown="handleEditKey(event,${id})">`

    const actions = document.getElementById(`actions-${id}`)
    actions.innerHTML = `
      <button class="btn btn-primary btn-sm" onclick="saveEdit(${id}, '${escAttr(currentImageUrl)}')">Save</button>
      <button class="btn btn-secondary btn-sm" onclick="cancelEdit(${id})">Cancel</button>
    `

    // Insert image edit row after the list item
    const item = document.getElementById(`item-${id}`)
    const imgRow = document.createElement('li')
    imgRow.id = `img-row-${id}`
    imgRow.style.padding = '.25rem .5rem .75rem'
    imgRow.style.borderBottom = `1px solid var(--border)`
    imgRow.innerHTML = `
      <div class="edit-image-row">
        ${currentImageUrl
          ? `<div class="edit-thumb"><img src="${currentImageUrl}" id="edit-thumb-img-${id}"></div>
             <button class="remove-img-btn" onclick="markRemoveImage(${id})">✕ Remove image</button>`
          : `<div class="edit-thumb" id="edit-thumb-${id}" style="display:flex;align-items:center;justify-content:center">${placeholder}</div>`
        }
        <label style="font-size:.8rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:.4rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/><path d="M3 15l4-4 3 3 3-3.5 5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          ${currentImageUrl ? 'Replace image' : 'Upload image'}
          <input type="file" id="edit-img-${id}" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="previewEditImage(this,${id})">
        </label>
        <span id="edit-img-name-${id}" style="font-size:.8rem;color:var(--muted)"></span>
      </div>
    `
    item.after(imgRow)
    document.getElementById(`edit-input-${id}`).focus()
  }

  function previewEditImage(input, id) {
    const file = input.files[0]
    if (!file) return
    document.getElementById(`edit-img-name-${id}`).textContent = file.name
    const thumbEl = document.getElementById(`edit-thumb-${id}`) || document.getElementById(`edit-thumb-img-${id}`)
    if (thumbEl) {
      if (thumbEl.tagName === 'IMG') {
        thumbEl.src = URL.createObjectURL(file)
      } else {
        thumbEl.innerHTML = `<img src="${URL.createObjectURL(file)}" style="width:100%;height:100%;object-fit:cover">`
      }
    }
  }

  function markRemoveImage(id) {
    const btn = document.querySelector(`#img-row-${id} .remove-img-btn`)
    if (btn) { btn.textContent = '(will be removed on save)'; btn.disabled = true; btn.dataset.remove = '1' }
    const thumb = document.querySelector(`#img-row-${id} .edit-thumb img`)
    if (thumb) thumb.style.opacity = '.3'
  }

  function handleEditKey(e, id) {
    if (e.key === 'Enter') saveEdit(id)
    if (e.key === 'Escape') cancelEdit(id)
  }

  function cancelEdit(id) {
    editingId = null
    document.getElementById(`img-row-${id}`)?.remove()
    loadAreas()
  }

  async function saveEdit(id, originalImageUrl) {
    const nameInput = document.getElementById(`edit-input-${id}`)
    const newName = nameInput.value.trim()
    if (!newName) { toast('Name cannot be empty.', 'error'); return }

    const fileInput = document.getElementById(`edit-img-${id}`)
    const removeBtn = document.querySelector(`#img-row-${id} .remove-img-btn`)
    const shouldRemove = removeBtn?.dataset.remove === '1'

    let imageUrl = originalImageUrl

    try {
      if (fileInput?.files[0]) {
        if (originalImageUrl) await removeImage(originalImageUrl)
        imageUrl = await uploadImage(fileInput.files[0], id)
      } else if (shouldRemove) {
        await removeImage(originalImageUrl)
        imageUrl = null
      }

      const { error } = await sb.from('areas').update({ name: newName, image_url: imageUrl }).eq('id', id)
      if (error) throw error

      editingId = null
      document.getElementById(`img-row-${id}`)?.remove()
      toast(`"${newName}" updated.`, 'success')
      loadAreas()
    } catch (e) {
      toast('Error saving. Try again.', 'error')
    }
  }

  async function addArea() {
    const nameInput = document.getElementById('new-area-name')
    const fileInput = document.getElementById('new-area-image')
    const name = nameInput.value.trim()
    const btn = document.getElementById('add-btn')

    if (!name) { nameInput.focus(); return }

    btn.disabled = true; btn.textContent = 'Adding...'

    try {
      const { data: max } = await sb.from('areas').select('sort_order').order('sort_order', { ascending: false }).limit(1)
      const nextOrder = max?.length ? max[0].sort_order + 1 : 1

      const { data: inserted, error } = await sb
        .from('areas').insert({ name, sort_order: nextOrder }).select().single()
      if (error) throw error

      let imageUrl = null
      if (fileInput.files[0]) {
        imageUrl = await uploadImage(fileInput.files[0], inserted.id)
        await sb.from('areas').update({ image_url: imageUrl }).eq('id', inserted.id)
      }

      nameInput.value = ''
      clearNewImage()
      toast(`"${name}" added.`, 'success')
      loadAreas()
    } catch (e) {
      toast('Error adding area. Try again.', 'error')
    } finally {
      btn.disabled = false; btn.textContent = '+ Add'
    }
  }

  async function deleteArea(id, name, imageUrl) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return
    if (imageUrl) await removeImage(imageUrl)
    const { error } = await sb.from('areas').delete().eq('id', id)
    if (error) { toast('Error deleting. Try again.', 'error'); return }
    toast(`"${name}" deleted.`, 'success')
    loadAreas()
  }

  // ── HELPERS ───────────────────────────────────────
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
  function escAttr(s) { return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;') }

  let toastTimer
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast')
    el.textContent = msg; el.className = `show ${type}`
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.className = '', 3000)
  }

  // ── INIT ──────────────────────────────────────────
  ;(async () => {
    const { data: { session } } = await sb.auth.getSession()
    if (session) showApp(session.user)
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
  })()
</script>
</body>
</html>
